<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reception - New Booking</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --border-color: #e5e7eb;
            --primary-blue: #2563eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: start; min-height: 100vh; padding: 20px; }
        .web-app-container { width: 100%; max-width: 480px; background: #fcfcfd; min-height: 85vh; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; border: 1px solid var(--border-color); }
        .header { padding: 20px 20px 10px 20px; display: flex; align-items: center; justify-content: space-between; background: #fff; }
        .header-left { display: flex; align-items: center; }
        .logo-badge { background-color: #0f172a; color: white; font-weight: 800; padding: 6px 10px; border-radius: 6px; font-size: 14px; margin-right: 12px; }
        .app-title { font-size: 20px; font-weight: 800; text-transform: uppercase; color: #000; }
        .role-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; background: #e2e8f0; color: #334155; padding: 3px 8px; border-radius: 12px; margin-left: 8px; }
        .role-badge.owner { background: #dbeafe; color: #1e40af; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border-color); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; font-size: 13px; font-weight: 600; color: #6b7280; text-decoration: none; }
        .tab-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }
        .booking-form-container { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .form-modal { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .form-modal input, .form-modal select { width: 100%; margin-bottom: 10px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .form-modal label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; color: #555; }
        .row-grid-modal { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; text-transform: uppercase; cursor: pointer; background: #10b981; color: #fff; width: 100%; }
        .form-modal input[readonly], .form-modal select[disabled] { background-color: #f1f5f9; color: #475569; border-color: #cbd5e1; cursor: not-allowed; }
        .modal-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); width: 90%; max-width: 360px; }
    </style>
</head>
<body>

    <div class="web-app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo-badge">DR</div>
                <h1 class="app-title">Demo Resort</h1>
                <span id="headerRole" class="role-badge" style="display: none;"></span>
            </div>
        </header>

        <nav class="nav-tabs">
            <a class="tab-item" href="index.html">
                <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a class="tab-item" href="addbill.html">
                <svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                New bill
            </a>
            <a class="tab-item" href="booking.html">
                <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                View Bookings
            </a>
        </nav>

        <div class="booking-form-container">
            <form class="form-modal" id="addBookingForm" onsubmit="event.preventDefault(); submitNewBooking();">
                <h2 style="margin-bottom:12px; font-size:18px; text-transform:uppercase; border-bottom:1px solid #eee; padding-bottom:4px;">New Booking</h2>
                
                <label for="newGuestName">Guest Name</label>
                <input type="text" id="newGuestName" required placeholder="Enter full name">

                <label for="newGuestPhone">Phone Number</label>
                <input type="tel" id="newGuestPhone" required placeholder="10-digit phone number">

                <div class="row-grid-modal">
                    <div>
                        <label for="newRoomNo">Room No</label>
                        <select id="newRoomNo" required>
                            <option value="A-1">A-1</option>
                            <option value="Twin-1">Twin-1</option>
                            <option value="Twin-2">Twin-2</option>
                            <option value="Paddy">Paddy</option>
                            <option value="P-1">P-1</option>
                            <option value="P-2">P-2</option>
                            <option value="Delux">Delux</option>
                        </select>
                    </div>
                    <div>
                        <label for="newCheckinDate">Check-in Date</label>
                        <input type="date" id="newCheckinDate" required>
                    </div>
                </div>

                <label for="newCheckoutDate">Check-out Target Date</label>
                <input type="date" id="newCheckoutDate" required>

                <div class="row-grid-modal">
                    <div>
                        <label for="newAdults">Adults Pax</label>
                        <input type="number" id="newAdults" min="1" value="1" required>
                    </div>
                    <div>
                        <label for="newKids">Kids Pax</label>
                        <input type="number" id="newKids" min="0" value="0" required>
                    </div>
                </div>

                <div class="row-grid-modal">
                    <div>
                        <label for="newTotalAmount">Total Rent (₹)</label>
                        <input type="number" id="newTotalAmount" min="0" required placeholder="0">
                    </div>
                    <div>
                        <label for="newAdvanceAmount">Advance Paid (₹)</label>
                        <input type="number" id="newAdvanceAmount" min="0" value="0" required placeholder="0">
                    </div>
                </div>

                <button type="submit" class="action-btn">Save Booking</button>
            </form>
        </div>
    </div>

    <div id="customAlertModalBg" class="modal-bg" style="display:none;">
        <div class="modal">
            <div class="modal-title" id="customAlertTitle">Notice</div>
            <div id="customAlertText" style="font-size:14px; line-height:1.5; margin-bottom:15px;"></div>
            <div style="display:flex; justify-content:flex-end;">
                <button type="button" style="padding:6px 14px; cursor:pointer;" onclick="closeCustomAlert()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const OWNER_EMAIL = "demo.booking2026@gmail.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCebk_0DBBu5w0cvWP0lUKqQanmiwoC42U",
            authDomain: "booking-25ba4.firebaseapp.com",
            projectId: "booking-25ba4",
            storageBucket: "booking-25ba4.firebasestorage.app",
            messagingSenderId: "924758316703",
            appId: "1:924758316703:web:6cee8188781143ae1774aa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            if (user.email !== OWNER_EMAIL) {
                alert("Access Denied: Owner account permissions required.");
                window.location.href = "booking.html";
                return;
            }
            document.getElementById('headerRole').textContent = "Owner";
            document.getElementById('headerRole').style.display = 'inline-block';

            // Catch explicit parameters forwarded by the calendar screen grid system selection
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('room')) document.getElementById('newRoomNo').value = urlParams.get('room');
            if(urlParams.has('date')) {
                document.getElementById('newCheckinDate').value = urlParams.get('date');
                document.getElementById('newCheckoutDate').min = urlParams.get('date');
            }
        });

        function submitNewBooking() {
            const name = document.getElementById('newGuestName').value.trim();
            const phone = document.getElementById('newGuestPhone').value.trim();
            const roomName = document.getElementById('newRoomNo').value;
            const checkin = document.getElementById('newCheckinDate').value;
            const checkout = document.getElementById('newCheckoutDate').value;
            const adults = parseInt(document.getElementById('newAdults').value) || 0;
            const kids = parseInt(document.getElementById('newKids').value) || 0;
            const total = parseFloat(document.getElementById('newTotalAmount').value) || 0;
            const advance = parseFloat(document.getElementById('newAdvanceAmount').value) || 0;

            if (phone.length !== 10 || isNaN(phone)) { showCustomAlert("Please enter a valid 10 digit mobile number."); return; }
            if (advance > total) { showCustomAlert("Advance paid cannot exceed the total rent."); return; }
            if (checkout < checkin) { showCustomAlert("Check-out date cannot fall before Check-in date."); return; }

            const start = new Date(checkin);
            const end = new Date(checkout);
            const promises = [];
            let currentDay = new Date(start);
            const bookingGroupId = "GRP_" + Date.now() + "_" + Math.random().toString(36).substring(2, 7);

            if (checkin === checkout) {
                promises.push(db.collection('bookings').add({
                    roomNo: roomName, name: name, phone: phone, total: total, advance: advance,
                    adults: adults, kids: kids, checkin: checkin, checkout: checkout,
                    checkedIn: "Upcoming", stayBack: false, bookingGroupId: bookingGroupId,
                    createdBy: 'owner', extraBills: []
                }));
            } else {
                while (currentDay < end) {
                    const formattedDateStr = currentDay.toISOString().split('T')[0];
                    let nextDay = new Date(currentDay);
                    nextDay.setDate(nextDay.getDate() + 1);
                    const isStayingBack = nextDay < end;

                    promises.push(db.collection('bookings').add({
                        roomNo: roomName, name: name, phone: phone, total: total, advance: advance,
                        adults: adults, kids: kids, checkin: formattedDateStr, checkout: checkout,
                        checkedIn: "Upcoming", stayBack: isStayingBack, bookingGroupId: bookingGroupId,
                        createdBy: 'owner', extraBills: []
                    }));
                    currentDay.setDate(currentDay.getDate() + 1);
                }
            }

            Promise.all(promises).then(() => {
                showCustomAlert("Booking saved successfully across selected timeline entries!", "Success");
            }).catch(err => { showCustomAlert("Database Exception: " + err.message); });
        }

        function showCustomAlert(message, title="Notice") {
            document.getElementById('customAlertTitle').innerText = title;
            document.getElementById('customAlertText').innerText = message;
            document.getElementById('customAlertModalBg').style.display = 'flex';
        }
        function closeCustomAlert() {
            document.getElementById('customAlertModalBg').style.display = 'none';
            if(document.getElementById('customAlertTitle').innerText === "Success") {
                window.location.href = "booking.html";
            }
        }
    </script>
</body>
</html>
