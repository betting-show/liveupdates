<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reception - Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #f4f5f7;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary-blue: #2563eb;
            --color-bookings: #f59e0b;
            --color-rooms: #10b981;
            --color-staff: #3b82f6;
            --color-menu: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: start; min-height: 100vh; padding: 20px; }
        .web-app-container { width: 100%; max-width: 480px; background: #fcfcfd; min-height: 85vh; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border-color); position: relative; }
        .header { padding: 20px 20px 10px 20px; display: flex; align-items: center; justify-content: space-between; background: #fff; }
        .header-left { display: flex; align-items: center; }
        .logo-badge { background-color: #0f172a; color: white; font-weight: 800; padding: 6px 10px; border-radius: 6px; font-size: 14px; margin-right: 12px; }
        .app-title { font-size: 20px; font-weight: 800; text-transform: uppercase; color: #000; }
        .role-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; background: #e2e8f0; color: #334155; padding: 3px 8px; border-radius: 12px; margin-left: 8px; }
        .role-badge.owner { background: #dbeafe; color: #1e40af; }
        .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; border-radius: 5px; display: flex; align-items: center; justify-content: center; }
        .logout-btn:hover { background: #fee2e2; color: #ef4444; }
        .logout-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; }
        .nav-tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border-color); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 12px 0; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; cursor: pointer; }
        .tab-item svg { width: 22px; height: 22px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; }
        .tab-item.active { color: var(--primary-blue); border-bottom: 3px solid var(--primary-blue); margin-bottom: -2px; background: #f8fafc; }
        .main-menu { padding: 20px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; flex: 1; }
        .menu-card { background: var(--card-bg); border-radius: 14px; display: flex; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.04); }
        .card-icon-side { width: 120px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .card-icon-side svg { width: 65px; height: 65px; color: white; }
        .card-info-side { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; }
        .card-title { font-size: 15px; font-weight: 800; text-transform: uppercase; color: #000; margin-bottom: 10px; }
        .manage-btn { background: white; border: 1.5px solid #000; color: #000; padding: 5px 22px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
        .manage-btn:hover { background: #000; color: white; }
        .bg-bookings { background-color: var(--color-bookings); }
        .bg-rooms { background-color: var(--color-rooms); }
        .bg-staff { background-color: var(--color-staff); }
        .bg-menu { background-color: var(--color-menu); }
        .modal-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); width: 90%; max-width: 360px; }
        .modal input { width: 100%; margin-bottom: 10px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        .modal-btn-row { display: flex; justify-content: flex-end; margin-top: 12px; gap: 8px; }
        .modal-btn-row button, .action-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-weight: 600; font-size: 13px; }
        .modal-title { margin-bottom: 16px; font-weight: bold; font-size: 18px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 6px; }
        .error { color: #e53935; margin-bottom: 8px; font-size: 13px; }
        .edit-btn { background: #ffa726 !important; color: #fff !important; border: none; }
        .delete-btn { background: #ef5350 !important; color: #fff !important; border: none; }
        .view-bill-btn { background: #10b981 !important; color: #fff !important; border: none; }
    </style>
</head>
<body>

    <div class="web-app-container">
        <header class="header">
            <div class="header-left">
                <div class="logo-badge">DR</div>
                <h1 class="app-title">Demo Resort</h1>
                <span id="headerRole" class="role-badge" style="display: none;"></span>
            </div>
            <button id="logoutBtn" class="logout-btn" onclick="logoutSession()" style="display: none;" title="Logout">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
            </button>
        </header>

        <nav class="nav-tabs">
            <a class="tab-item active" id="dashboardTab" href="index.html">
                <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a class="tab-item" href="addbill.html">
                <svg viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
                New bill
            </a>
            <a class="tab-item" href="pending.html">
                <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Pending Orders
            </a>
            <a class="tab-item">
                <svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Account
            </a>
        </nav>

        <div id="appWorkspace" style="flex: 1; overflow-y: auto;">
            <main class="main-menu" id="dashboardView">
                <div class="menu-card">
                    <div class="card-icon-side bg-bookings">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-6h.008v.008H12v-.008zM12 15h.008v.008H12V15zm0 2.25h.008v.008H12v-.008zM9.75 15h.008v.008H9.75V15zm0 2.25h.008v.008H9.75v-.008zM7.5 15h.008v.008H7.5V15zm0 2.25h.008v.008H7.5v-.008zm6.75-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V15zm0 2.25h.008v.008h-.008v-.008zm2.25-4.5h.008v.008H16.5v-.008zm0 2.25h.008v.008H16.5V15z" /></svg>
                    </div>
                    <div class="card-info-side">
                        <div class="card-title">Upcoming Bookings</div>
                        <a href="booking.html" class="manage-btn" style="text-align:center;">Manage</a>
                    </div>
                </div>

                <div class="menu-card">
                    <div class="card-icon-side bg-rooms">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9 6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5 3H15M9 16.5h1.5M13.5 16.5H15" /></svg>
                    </div>
                    <div class="card-info-side">
                        <div class="card-title">Room Details</div>
                        <a href="room_details.html" class="manage-btn">Manage</a>
                    </div>
                </div>

                <div class="menu-card">
                    <div class="card-icon-side bg-staff">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" /></svg>
                    </div>
                    <div class="card-info-side">
                        <div class="card-title">Staff Details</div>
                        <button class="manage-btn">Manage</button>
                    </div>
                </div>

                <div class="menu-card">
                    <div class="card-icon-side bg-menu">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" /></svg>
                    </div>
                    <div class="card-info-side">
                        <div class="card-title">Menu Card Edit</div>
                        <button class="manage-btn">Manage</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="loginModal" class="modal-bg" style="display:none;">
        <form class="modal" onsubmit="event.preventDefault();loginWithEmail();">
            <div class="modal-title">Admin Login</div>
            <div id="loginError" class="error"></div>
            <input type="email" id="loginEmail" placeholder="Email" required autocomplete="username">
            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
            <div class="modal-btn-row">
                <button type="submit" class="action-btn edit-btn" style="margin-top:0;">Login</button>
            </div>
        </form>
    </div>

    <div id="customConfirmModalBg" class="modal-bg" style="display:none; z-index: 3000;">
        <div class="modal">
            <div class="modal-title">Confirm Action</div>
            <div id="customConfirmText" style="font-size:14px; line-height:1.5; margin-bottom:15px; color: var(--text-main);"></div>
            <div class="modal-btn-row">
                <button type="button" onclick="closeCustomConfirm(false)">Cancel</button>
                <button type="button" class="action-btn delete-btn" style="margin-top:0;" onclick="closeCustomConfirm(true)">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        const OWNER_EMAIL = "demo.booking2026@gmail.com";
        let confirmCallback = null;

        const firebaseConfig = {
            apiKey: "AIzaSyCebk_0DBBu5w0cvWP0lUKqQanmiwoC42U",
            authDomain: "booking-25ba4.firebaseapp.com",
            projectId: "booking-25ba4",
            storageBucket: "booking-25ba4.firebasestorage.app",
            messagingSenderId: "924758316703",
            appId: "1:924758316703:web:6cee8188781143ae1774aa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            const roleBadge = document.getElementById('headerRole');
            const logoutBtn = document.getElementById('logoutBtn');
            if (user) {
                document.getElementById('loginModal').style.display = 'none';
                if (user.email === OWNER_EMAIL) {
                    roleBadge.textContent = "Owner";
                    roleBadge.className = "role-badge owner";
                } else {
                    roleBadge.textContent = "Staff";
                    roleBadge.className = "role-badge";
                }
                roleBadge.style.display = 'inline-block';
                logoutBtn.style.display = 'flex';
            } else {
                document.getElementById('loginModal').style.display = 'flex';
                roleBadge.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        });

        function loginWithEmail(){
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            auth.signInWithEmailAndPassword(email, password)
                .then(() => { document.getElementById('loginError').textContent=''; })
                .catch(e => { document.getElementById('loginError').textContent = e.message; });
        }

        function logoutSession(){
            showCustomConfirm("Are you sure you want to log out?", function(confirmed){
                if(confirmed) {
                    auth.signOut().catch(e => { alert("Error signing out: " + e.message); });
                }
            });
        }

        function showCustomConfirm(message, callback) {
            confirmCallback = callback;
            document.getElementById('customConfirmText').innerText = message;
            document.getElementById('customConfirmModalBg').style.display = 'flex';
        }
        function closeCustomConfirm(status) {
            document.getElementById('customConfirmModalBg').style.display = 'none';
            if(confirmCallback) { confirmCallback(status); confirmCallback = null; }
        }
    </script>
</body>
</html>
